version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      astro:
        patterns:
          - "@astrojs/*"
          - "astro"
      dev-tools:
        patterns:
          - "@lhci/*"
          - "linkinator"
          - "pa11y-ci"
          - "typescript"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
