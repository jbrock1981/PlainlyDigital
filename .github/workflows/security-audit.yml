name: Weekly security audit

on:
  schedule:
    # Mondays at 13:00 UTC (8 AM Central)
    - cron: "0 13 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    name: npm audit + open issue on findings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Run npm audit (moderate+)
        id: audit
        run: |
          set +e
          # Weekly run is stricter than CI — flag moderate so they go on the radar
          npm audit --audit-level=moderate --json > audit.json
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ $status -ne 0 ]; then
            echo "::warning::npm audit found vulnerabilities (exit $status)"
          fi
          exit 0

      - name: Open or update tracking issue
        if: steps.audit.outputs.status != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const audit = JSON.parse(fs.readFileSync('audit.json', 'utf8'));
            const meta = audit.metadata?.vulnerabilities ?? {};
            const summary = `Critical: ${meta.critical ?? 0} • High: ${meta.high ?? 0} • Moderate: ${meta.moderate ?? 0} • Low: ${meta.low ?? 0}`;
            const title = `[security] npm audit findings — ${new Date().toISOString().slice(0,10)}`;
            const body = [
              `Weekly \`npm audit\` workflow found vulnerabilities.`,
              ``,
              `**Summary**: ${summary}`,
              ``,
              `Run \`npm audit\` locally for details. Workflow: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'security,automated',
              state: 'open',
            });
            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title, body,
                labels: ['security','automated'],
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body,
              });
            }
