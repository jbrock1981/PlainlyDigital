name: Lighthouse CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    name: Lighthouse + a11y
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Start preview server
        run: npx --no-install astro preview --host 0.0.0.0 --port 4321 &
        env:
          CI: "true"
      - name: Wait for server
        run: npx --yes wait-on http://localhost:4321 -t 60000
      - name: Lighthouse CI
        run: |
          npx --yes @lhci/cli@0.14.x autorun \
            --config=./lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
