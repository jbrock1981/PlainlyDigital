name: Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

# Minimal CI by design: just build verification.
# Heavier checks (Lighthouse, link audit, full a11y) will move to a self-hosted
# Plainly Digital CI/CD pipeline on GCP later — see ROADMAP.md.
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
