# Cloud Build pipeline for the Plainly Digital LLC marketing site.
# Triggered on push to main (production deploy) and on PR (preview channel deploy).
# See DEPLOY.md for one-time trigger setup commands.
steps:
  - id: install
    name: node:20
    entrypoint: npm
    args: ['ci']
    env:
      - 'NODE_ENV=development'

  - id: build
    name: node:20
    entrypoint: npm
    args: ['run', 'build']

  - id: lint-links
    name: node:20
    entrypoint: npm
    args: ['run', 'lint:links']

  - id: deploy-hosting
    name: gcr.io/cloud-builders/firebase
    args:
      - 'deploy'
      - '--only=hosting'
      - '--project=$PROJECT_ID'
      - '--non-interactive'
      - '--message=Cloud Build $SHORT_SHA on $BRANCH_NAME'

timeout: '900s'
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
