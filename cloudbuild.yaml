# Cloud Build pipeline for the Plainly Digital LLC marketing site.
# Triggered on push to main (production deploy).
# See DEPLOY.md for one-time trigger setup commands.
#
# Uses one combined node:20 step rather than the deprecated
# gcr.io/cloud-builders/firebase image. firebase-tools is pulled via
# npx so we never have to maintain a custom builder image.
steps:
  - id: build-and-deploy
    name: node:20
    entrypoint: bash
    env:
      - 'NODE_ENV=development'
    args:
      - '-c'
      - |
        set -e
        npm ci
        npm run icons:build
        npm run build
        npm run lint:links
        npx --yes firebase-tools@latest deploy \
          --only hosting \
          --project=$PROJECT_ID \
          --non-interactive \
          --message="Cloud Build $SHORT_SHA on $BRANCH_NAME"

timeout: '900s'
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
